<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMOR GamePass</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="launcher-ui">
        <div id="header">
            <div id="status-bar">
                <span id="gamepad-status" class="disconnected">● DISCONNECTED</span>
                <span id="clock">00:00</span>
            </div>
            
            <!-- Eklenti Butonu (Sadece gerekli olan kısım) -->
            <div id="extension-tool">
                <a href="https://chromewebstore.google.com/detail/allow-cors-access-control/lhobafcepgpndahomeajglpckpkeicid" target="_blank" id="cors-btn">
                    CORS EXTENSION
                </a>
            </div>
        </div>

        <div id="main-content">
            <div id="game-grid" class="game-grid">
                <!-- Oyunlar JS ile buraya gelecek -->
            </div>
        </div>

        <div id="footer">
            <div class="controls-hint">
                <span><b>A</b> SEÇ</span>
                <span><b>◀ ▶</b> GEZİN</span>
            </div>
        </div>
    </div>

    <div id="emulator-layer" style="display: none;">
        <div id="canvas-wrapper"></div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
