<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMOR GamePass</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body>

    <div id="launcher-ui">
        <div id="header">
            <div id="status-bar">
                <span id="gamepad-status" class="disconnected">● DISCONNECTED</span>
                <span id="clock">00:00</span>
            </div>
            
            <!-- Eklenti Butonu -->
            <div id="extension-tool">
                <a href="https://chromewebstore.google.com/detail/allow-cors-access-control/lhobafcepgpndahomeajglpckpkeicid" target="_blank" id="cors-btn">
                    <i class="fas fa-plug"></i> CORS EXTENSION
                </a>
            </div>
        </div>

        <div id="main-content">
            <h1 class="title">EDMOR <span>GAMEPASS</span></h1>
            <div id="game-grid" class="game-grid">
                <!-- Oyunlar JS ile buraya yüklenecek -->
            </div>
        </div>

        <div id="footer">
            <div class="controls-hint">
                <span><b class="btn-a">A</b> SEÇ</span>
                <span><b class="btn-dir">◀ ▶</b> GEZİN</span>
            </div>
        </div>
    </div>

    <!-- Emülatör Katmanı -->
    <div id="emulator-layer" style="display: none;">
        <div id="canvas-wrapper"></div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
