<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmor GamePass</title>
    <style>
        :root { 
            --purple: #6b46c1; 
            --dark: #0f172a; 
            --text: #f8fafc;
            --gp-gray: #1e293b;
        }
        
        body { 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a); 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        header { 
            padding: 30px 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .status-bar { display: flex; gap: 25px; font-size: 0.85rem; font-weight: 700; opacity: 0.8; }
        .connected { color: #4ade80; }
        .disconnected { color: #f87171; }
        .logo { letter-spacing: 10px; font-size: 1.5rem; font-weight: 900; }

        /* Game Pass Grid Düzeni */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
            padding: 20px 60px; 
            height: 70vh; 
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .game-grid::-webkit-scrollbar { display: none; } /* Chrome/Edge */

        /* Yatay Kart Yapısı */
        .game-card { 
            background: var(--gp-gray); 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 4px solid transparent; 
            cursor: pointer;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }

        .game-card.focused { 
            transform: scale(1.05); 
            border-color: #ffffff; /* Game Pass Beyazı */
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        .game-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .game-info { 
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 20px 15px 10px 15px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Emülatör Katmanı */
        #emulator-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 9999; 
            display: none; 
        }
        #canvas-wrapper { width: 100%; height: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="status-bar">
            <span id="clock">00:00</span>
            <span id="gamepad-status" class="disconnected">● KONTROLCÜ BAĞLI DEĞİL</span>
        </div>
        <div class="logo">EDMOR</div>
    </header>

    <main id="launcher-ui">
        <div class="game-grid" id="game-grid">
            <!-- Oyunlar dinamik olarak buraya gelecek -->
        </div>
    </main>

    <div id="emulator-layer">
        <div id="canvas-wrapper"></div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
